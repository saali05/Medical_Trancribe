<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — DocAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0d1b2a;
      --navy-mid:  #152236;
      --teal:      #0ea5a0;
      --teal-dim:  #0a7a76;
      --teal-glow: rgba(14,165,160,0.12);
      --slate:     #8fa3b8;
      --white:     #f0f4f8;
      --surface:   #172840;
      --danger:    #e05b5b;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 40px; height: 40px;
      background: var(--teal);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg { width: 22px; height: 22px; fill: white; }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--white);
    }

    .brand-name span { color: var(--teal); }

    .login-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px;
    }

    .login-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--slate);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--slate);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    .form-control {
      width: 100%;
      background: var(--navy);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-control:focus { border-color: var(--teal); }
    .form-control::placeholder { color: rgba(143,163,184,0.5); }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-login:hover { background: var(--teal-dim); }

    .error-box {
      background: rgba(224,91,91,0.1);
      border: 1px solid rgba(224,91,91,0.25);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .error-box svg { width: 15px; height: 15px; flex-shrink: 0; }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--slate);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: rgba(143,163,184,0.4);
      font-size: 11px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .info-pills {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .info-pill {
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: var(--slate);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .info-pill svg { width: 11px; height: 11px; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3a1 1 0 110 2 1 1 0 010-2zm3 10H9v-1h6v1zm0-3H9v-1h6v1zm0-3h-4v-1h4v1z"/></svg>
    </div>
    <div class="brand-name">Doc<span>AI</span></div>
  </div>

  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-subtitle">Sign in to your clinical workspace</div>

    {% if form.errors %}
    <div class="error-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Sign in</button>
      <div style="
    text-align:center;
    margin-top:18px;
    font-size:13px;
    color:var(--slate);
    ">

    Don't have an account?

    <a href="{% url 'register' %}" style="
        color:var(--teal);
        text-decoration:none;
        font-weight:600;
    ">
        Create Account
    </a>

    </div>
    </form>

    <div class="footer-note">
      Secure clinical workspace · Data stays local
    </div>
  </div>

  <div class="info-pills">
    <span class="info-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Encrypted
    </span>
    <span class="info-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Whisper AI
    </span>
    <span class="info-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      HIPAA-ready
    </span>
  </div>
</div>

</body>
</html>
